<div class="alert alert-dark">
  <div class="log-table">
    @for (item of logs; track item) {
      <p>
        {{ item.message }}
      </p>
    }@empty {
      <div class="d-flex align-items-center">
        <strong role="status">Načítání...</strong>
        <div class="spinner-border ms-auto" aria-hidden="true"></div>
      </div>
    }
  </div>
</div>
