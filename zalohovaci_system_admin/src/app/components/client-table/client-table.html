<table class="table table-striped">
  <thead>
  <tr>
    <th scope="col">ID</th>
    <th scope="col">Název PC</th>
    <th scope="col"></th>
  </tr>
  </thead>
  <tbody>
    @for (item of clients; track item) {
      <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.pcname }}</td>
        <td>
          <a routerLink="/job/{{ item.id }}"><i class="bi bi-eye"></i></a>
        </td>
      </tr>
    }@empty {
      <div class="d-flex align-items-center">
        <strong role="status">Načítání...</strong>
        <div class="spinner-border ms-auto" aria-hidden="true"></div>
      </div>
    }
  </tbody>
</table>
